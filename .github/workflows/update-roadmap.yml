name: Update roadmap from Monday

on:
  workflow_dispatch:
    inputs:
      board_id:
        description: Monday board ID
        required: false
        default: "18396795757"
        type: string
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: monday-roadmap-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate index.html from Monday
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_BOARD_ID: ${{ github.event.inputs.board_id || '18396795757' }}
        run: node scripts/generate-release-plan.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html"
          else
            git commit -m "chore: refresh roadmap from Monday board ${MONDAY_BOARD_ID}"
            git push
          fi
