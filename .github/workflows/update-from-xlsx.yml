name: Build roadmap from Excel export

on:
  push:
    paths:
      - "data/**.xlsx"
      - "Data/**.xlsx"
  workflow_dispatch:

concurrency:
  group: xlsx-roadmap-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate index.html from data/board-export.xlsx
        run: npm run generate:xlsx

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html"
          else
            git commit -m "chore: refresh roadmap from Monday Excel export"
            git push
          fi
